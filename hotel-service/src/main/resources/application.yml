server:
  port: 8080

spring:
  application:
    name: hotel-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hoteldb}
    username: ${SPRING_DATASOURCE_USERNAME:hoteluser}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
  cache:
    type: redis
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AWS_COGNITO_ISSUER_URI:https://cognito-idp.eu-central-1.amazonaws.com/placeholder}
  cloud:
    aws:
      region:
        static: ${AWS_REGION:eu-central-1}
      credentials:
        use-default-aws-credential-chain: true

app:
  sqs:
    queue-url: ${AWS_SQS_QUEUE_URL:}
  s3:
    bucket-name: ${S3_BUCKET_NAME:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
